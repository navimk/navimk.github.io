    <title>Hola mundo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script>
        // Aplicar tema inmediatamente para evitar parpadeo blanco/oscuro en la carga
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const initialTheme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', initialTheme);
    </script>
</head>
<body>
    <!-- Top App Bar -->
    <header class="top-app-bar">
        <div class="top-app-bar__container">
            <div style="display: flex; align-items: center; gap: 12px;">
                <a href="index.html" class="icon-button" aria-label="Volver al inicio" style="text-decoration: none;">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <span class="top-app-bar__title">Navi</span>
            </div>
        </div>
    </header>

    <main class="main-content">
    <section class="about-card">
        <h1 class="hello">Hola mundo!</h1>
        <img src="assets/spinning-cat.gif">
    </section>
    </main>
</body>
