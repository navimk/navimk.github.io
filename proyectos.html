<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/icon.webp">
    <meta name="description" content="Proyectos de Navi">
    <title>Proyectos - Navi</title>
    <!-- Google Fonts and Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
    <script>
        // Aplicar tema inmediatamente para evitar parpadeo blanco/oscuro en la carga
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const initialTheme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', initialTheme);
    </script>
</head>
<!--Recordatorio para Navi/Nina-->
<!--Ordena mejor los putos html que estan todos revueltos-->
<body>
    <!-- Top App Bar Component -->
    <nav-header active="proyectos"></nav-header>

    <main class="main-content">
        <!-- Projects Section Header -->
        <section class="hero-info"
            style="margin-top: 16px; align-items: flex-start; flex-direction: column; gap: 12px;">
            <h1 class="section-title display-name">Mis Proyectos</h1>
            <p class="headline-text" >Aquí puedes explorar las herramientas, scripts y experimentos en los que he
                trabajado para divertirme y pasar el rato.</p>
        </section>

        <!-- Projects Grid Section -->
        <section class="projects-section">
            <div id="projects-container" class="projects-grid">
                <!-- Proyectos inyectados vía render-proyectos.js -->
            </div>
            </div>
        </section>
    </main>

    <!-- Footer Component -->
    <nav-footer></nav-footer>

    <!-- Contenedor para Modales Dinámicos -->
    <div id="modals-container"></div>

    <!-- JS Script -->
    <script src="/scripts/components.js"></script>
    <script src="/scripts/proyectos-data.js"></script>
    <script src="/scripts/render-proyectos.js"></script>
    <script src="/scripts/script.js"></script>
</body>

</html>
