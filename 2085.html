<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Regresiva</title>
    <style>
        /* CSS: Esto le da estilo visual a la página */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #bc8549;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        #contador {
            display: flex;
            gap: 20px;
            font-size: 1.5rem;
        }

        .bloque-tiempo {
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 80px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .numero {
            display: block;
            font-size: 3rem;
            font-weight: bold;
            color: #cfb88d; /* Color verde para los números */
        }

        .etiqueta {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #bbb;
        }
    </style>
</head>
<body>

    <h1>Tiempo restante para 2085:</h1>
    
    <div id="contador">
        <div class="bloque-tiempo">
            <span id="dias" class="numero">00</span>
            <span class="etiqueta">Días</span>
        </div>
        <div class="bloque-tiempo">
            <span id="horas" class="numero">00</span>
            <span class="etiqueta">Horas</span>
        </div>
        <div class="bloque-tiempo">
            <span id="minutos" class="numero">00</span>
            <span class="etiqueta">Min</span>
        </div>
        <div class="bloque-tiempo">
            <span id="segundos" class="numero">00</span>
            <span class="etiqueta">Seg</span>
        </div>
    </div>

    <h2 id="mensaje-final" style="display:none; color: tomato;">¡El tiempo ha terminado!</h2>

    <script>
        // JAVASCRIPT: La lógica del temporizador
        
        // 1. Define la fecha objetivo (Formato: Mes Día, Año Hora:Minuto:Segundo)
        const fechaObjetivo = new Date("Jan 1, 2085 00:00:00").getTime();

        // 2. Actualiza la cuenta cada 1 segundo (1000 milisegundos)
        const intervalo = setInterval(function() {

            // Obtener la fecha y hora de hoy
            const ahora = new Date().getTime();

            // Encontrar la distancia entre ahora y la fecha objetivo
            const distancia = fechaObjetivo - ahora;

            // Cálculos de tiempo para días, horas, minutos y segundos
            const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

            // Mostrar el resultado en los elementos HTML correspondientes
            document.getElementById("dias").innerText = dias;
            document.getElementById("horas").innerText = horas < 10 ? "0" + horas : horas;
            document.getElementById("minutos").innerText = minutos < 10 ? "0" + minutos : minutos;
            document.getElementById("segundos").innerText = segundos < 10 ? "0" + segundos : segundos;

            // Si la cuenta regresiva termina
            if (distancia < 0) {
                clearInterval(intervalo);
                document.getElementById("contador").style.display = "none";
                document.getElementById("mensaje-final").style.display = "block";
            }
        }, 1000);
    </script>

</body>
</html>
