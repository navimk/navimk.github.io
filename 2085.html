<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="2085">
    <link rel="icon" href="assets/icon.webp">
    <title>Cuenta Regresiva a 2085</title>
    <!-- Google Fonts and Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
    <script>
        // Aplicar tema inmediatamente para evitar parpadeo blanco/oscuro en la carga
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const initialTheme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', initialTheme);
    </script>
</head>

<body>
    <!-- Top App Bar Component -->
    <nav-header back="true"></nav-header>

    <!-- Main Content -->
    <main class="main-content">
        <section class="countdown-section">
            <div class="countdown-card">
                <h1 class="countdown-title">Tiempo restante para 2085</h1>
                <p class="countdown-subtitle">no seria gracioso tener un contador que dure hasta ese año (?)</p>

                <div id="contador" class="countdown-grid">
                    <div class="bloque-tiempo">
                        <span id="dias" class="numero">00</span>
                        <span class="etiqueta">Días</span>
                    </div>
                    <div class="bloque-tiempo">
                        <span id="horas" class="numero">00</span>
                        <span class="etiqueta">Horas</span>
                    </div>
                    <div class="bloque-tiempo">
                        <span id="minutos" class="numero">00</span>
                        <span class="etiqueta">Minutos</span>
                    </div>
                    <div class="bloque-tiempo">
                        <span id="segundos" class="numero">00</span>
                        <span class="etiqueta">Segundos</span>
                    </div>
                </div>

                <h2 id="mensaje-final" style="display:none;" class="final-message">Hola!</h2>

                <div style="margin-top: 36px; display: flex; justify-content: center;">
                    <a href="https://www.youtube.com/watch?v=4t3IgrvlKMI" target="_blank" class="btn-primary"
                        style="background-color: #d8232a; color: #ffffff; gap: 8px; box-shadow: 0 4px 12px rgba(216, 35, 42, 0.25);">
                        <span class="material-symbols-outlined">music_note</span>
                        <span>Escuchar "2085" de AJR</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Component -->
    <nav-footer></nav-footer>

    <!-- JAVASCRIPT: La lógica del temporizador -->
    <script>
        // 1. Define la fecha objetivo (Formato: Mes Día, Año Hora:Minuto:Segundo)
        const fechaObjetivo = new Date("Jan 1, 2085 00:00:00").getTime();

        // 2. Actualiza la cuenta cada 1 segundo (1000 milisegundos)
        const intervalo = setInterval(function () {

            // Obtener la fecha y hora de hoy
            const ahora = new Date().getTime();

            // Encontrar la distancia entre ahora y la fecha objetivo
            const distancia = fechaObjetivo - ahora;

            // Cálculos de tiempo para días, horas, minutos y segundos
            const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

            // Mostrar el resultado en los elementos HTML correspondientes
            document.getElementById("dias").innerText = dias;
            document.getElementById("horas").innerText = horas < 10 ? "0" + horas : horas;
            document.getElementById("minutos").innerText = minutos < 10 ? "0" + minutos : minutos;
            document.getElementById("segundos").innerText = segundos < 10 ? "0" + segundos : segundos;

            // Si la cuenta regresiva termina
            if (distancia < 0) {
                clearInterval(intervalo);
                document.getElementById("contador").style.display = "none";
                document.getElementById("mensaje-final").style.display = "block";
            }
        }, 1000);
    </script>
    <!-- JS Script del tema y modales -->
    <script src="/scripts/components.js"></script>
    <script src="/scripts/script.js"></script>
</body>

</html>
